<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Wakalabs Pro">
  <meta name="theme-color" content="#0d0a16">
  <link rel="manifest" href="manifest.json">
  <title>Wakalabs Pro</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0d0a16;
    }

    /* Tela de loading enquanto o iframe carrega */
    #splash {
      position: fixed;
      inset: 0;
      background: #0d0a16;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 10;
      transition: opacity 0.5s ease;
    }
    #splash.fade { opacity: 0; pointer-events: none; }

    .logo {
      font-size: 26px;
      font-weight: 800;
      font-family: sans-serif;
      background: linear-gradient(to right, #fff, #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid #2e2645;
      border-top-color: #a855f7;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .msg { font-size: 12px; color: #94a3b8; font-family: sans-serif; }

    /* O iframe ocupa a tela toda */
    #app-frame {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
  </style>
</head>
<body>

  <!-- Splash de carregamento -->
  <div id="splash">
    <div class="logo">Wakalabs Pro</div>
    <div class="spinner"></div>
    <div class="msg">Carregando sua carteira...</div>
  </div>

  <!-- Apps Script carregado dentro do iframe -->
  <iframe
    id="app-frame"
    src="https://script.google.com/macros/s/AKfycbw6U3oPVeG1FlADMXevQfFogEmcGPxQI0t7TnXd9mgpF5XPRUd7KgoCm-rH6_2FIQPA/exec"
    allow="fullscreen"
  ></iframe>

  <script>
    // Registra o Service Worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }

    // Esconde o splash quando o iframe terminar de carregar
    document.getElementById('app-frame').addEventListener('load', function() {
      setTimeout(function() {
        document.getElementById('splash').classList.add('fade');
      }, 500);
    });
  </script>
</body>
</html>
